version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./prd:/app/prd:ro
    environment:
      - BUDGET_DB_PATH=/app/data
      - BUDGET_CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
